# Docker Compose — single file with profiles
# Usage (Redis enabled):  docker compose --profile <dev|test|demo|prod> --profile redis up
# Usage (Redis disabled): docker compose --profile <dev|test|demo|prod> up
# Requires: copy env_templates\.env.<env> .env

services:

  postgresDB:
    platform: linux/amd64
    image: postgres:18
    container_name: PostgresDB
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_DB_PORT}:${POSTGRES_DB_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./initdb:/docker-entrypoint-initdb.d:ro
      - ./initdb/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=10
      -c hot_standby=on
      -c hba_file=/etc/postgresql/pg_hba.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgresRepDB:
    profiles: [replica]
    platform: linux/amd64
    image: postgres:18
    container_name: PostgresRepDB
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_DB_USER}
      PGPASSWORD: ${POSTGRES_DB_PASSWORD}
    ports:
      - "${POSTGRES_REP_DB_PORT}:5432"
    volumes:
      - postgres_rep_data:/var/lib/postgresql/data
      - ./scripts/replica-setup.sh:/replica-setup.sh:ro
    entrypoint: ["/bin/bash", "/replica-setup.sh"]
    depends_on:
      postgresDB:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  nodeapi-dev:
    profiles: [dev]
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    image: napiserver
    container_name: nodeapi-dev
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL}
      NODE_SERVER_PORT: ${NODE_SERVER_PORT}
      NODE_ENV: ${NODE_ENV}
      POSTGRES_DB_USER: ${POSTGRES_DB_USER}
      POSTGRES_DB_PASSWORD: ${POSTGRES_DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_TTL: ${REDIS_TTL}
      REDIS_ENABLED: ${REDIS_ENABLED}
      PGBOUNCER_ENABLED: ${PGBOUNCER_ENABLED}
      PGBOUNCER_PORT: ${PGBOUNCER_PORT}
    ports:
      - "${NODE_SERVER_PORT}:${NODE_SERVER_PORT}"
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npx prisma migrate dev && npm run dev"
    depends_on:
      postgresDB:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy

  nodeapi-test:
    profiles: [test]
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    image: napiserver
    container_name: nodeapi-test
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL}
      NODE_SERVER_PORT: ${NODE_SERVER_PORT}
      NODE_ENV: ${NODE_ENV}
      POSTGRES_DB_USER: ${POSTGRES_DB_USER}
      POSTGRES_DB_PASSWORD: ${POSTGRES_DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_TTL: ${REDIS_TTL}
      REDIS_ENABLED: ${REDIS_ENABLED}
      PGBOUNCER_ENABLED: ${PGBOUNCER_ENABLED}
      PGBOUNCER_PORT: ${PGBOUNCER_PORT}
    ports:
      - "${NODE_SERVER_PORT}:${NODE_SERVER_PORT}"
    command: sh -c "npx prisma migrate deploy && npm test"
    depends_on:
      postgresDB:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy

  nodeapi-demo:
    profiles: [demo]
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    image: napiserver
    container_name: nodeapi-demo
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL}
      NODE_SERVER_PORT: ${NODE_SERVER_PORT}
      NODE_ENV: ${NODE_ENV}
      POSTGRES_DB_USER: ${POSTGRES_DB_USER}
      POSTGRES_DB_PASSWORD: ${POSTGRES_DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_TTL: ${REDIS_TTL}
      REDIS_ENABLED: ${REDIS_ENABLED}
      PGBOUNCER_ENABLED: ${PGBOUNCER_ENABLED}
      PGBOUNCER_PORT: ${PGBOUNCER_PORT}
    ports:
      - "${NODE_SERVER_PORT}:${NODE_SERVER_PORT}"
    command: sh -c "npx prisma migrate deploy && node src/server.js"
    depends_on:
      postgresDB:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy

  nodeapi-prod:
    profiles: [prod]
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    image: napiserver
    container_name: nodeapi-prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_DATABASE_URL: ${DIRECT_DATABASE_URL}
      NODE_SERVER_PORT: ${NODE_SERVER_PORT}
      NODE_ENV: ${NODE_ENV}
      POSTGRES_DB_USER: ${POSTGRES_DB_USER}
      POSTGRES_DB_PASSWORD: ${POSTGRES_DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_TTL: ${REDIS_TTL}
      REDIS_ENABLED: ${REDIS_ENABLED}
      PGBOUNCER_ENABLED: ${PGBOUNCER_ENABLED}
      PGBOUNCER_PORT: ${PGBOUNCER_PORT}
    ports:
      - "${NODE_SERVER_PORT}:${NODE_SERVER_PORT}"
    command: sh -c "npx prisma migrate deploy && node src/server.js"
    restart: always
    depends_on:
      postgresDB:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy

  pgbackup:
    profiles: [dev, test, demo, prod]
    platform: linux/amd64
    image: postgres:18
    container_name: pgbackup
    environment:
      POSTGRES_DB_USER: ${POSTGRES_DB_USER}
      POSTGRES_DB_PASSWORD: ${POSTGRES_DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_DB_HOST: postgresDB
      POSTGRES_DB_PORT: ${POSTGRES_DB_PORT}
      BACKUP_INTERVAL: "86400"
    volumes:
      - ./backups:/backups
    command: sh -c "while true; do PGPASSWORD=$$POSTGRES_DB_PASSWORD pg_dump -U $$POSTGRES_DB_USER -h $$POSTGRES_DB_HOST -p $$POSTGRES_DB_PORT -d $$POSTGRES_DB -F c -b -v -f /backups/$${POSTGRES_DB}_backup_$$(date +%Y%m%d_%H%M%S).dump; sleep $$BACKUP_INTERVAL; done"
    depends_on:
      postgresDB:
        condition: service_healthy

  redis:
    profiles: [redis]
    platform: linux/amd64
    image: redis:7
    container_name: app-redis
    restart: always
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgbouncer:
    profiles: [pgbouncer]
    platform: linux/amd64
    image: pgbouncer/pgbouncer:latest
    container_name: pgbouncer
    entrypoint: ["/opt/pgbouncer/pgbouncer", "/etc/pgbouncer/pgbouncer.ini"]
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "${PGBOUNCER_PORT}:${PGBOUNCER_PORT}"
    depends_on:
      postgresDB:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost ${PGBOUNCER_PORT} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  postgres_rep_data:
  redis_data:
