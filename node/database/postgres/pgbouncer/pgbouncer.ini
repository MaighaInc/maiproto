[databases]
; Route all connections to PostgreSQL service (Docker internal DNS)
devdb  = host=postgresDB port=5432 dbname=devdb
testdb = host=postgresDB port=5432 dbname=testdb
demodb = host=postgresDB port=5432 dbname=demodb
proddb = host=postgresDB port=5432 dbname=proddb

[pgbouncer]
listen_addr         = 0.0.0.0
listen_port         = 6432
auth_type           = md5
auth_file           = /etc/pgbouncer/userlist.txt

; Pool settings
pool_mode           = transaction
max_client_conn     = 1000
default_pool_size   = 20
min_pool_size       = 5
reserve_pool_size   = 5
reserve_pool_timeout = 3

; Logging
logfile             = /var/log/pgbouncer/pgbouncer.log
pidfile             = /var/run/pgbouncer/pgbouncer.pid
log_connections     = 1
log_disconnections  = 1
log_pooler_errors   = 1

; Timeouts
server_idle_timeout    = 600
client_idle_timeout    = 0
query_timeout          = 0
server_connect_timeout = 15
